name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: renzora-launcher-windows-x64.zip
            binary: target/x86_64-pc-windows-msvc/release/renzora-launcher.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: renzora-launcher-windows-arm64.zip
            binary: target/aarch64-pc-windows-msvc/release/renzora-launcher.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: renzora-launcher-macos-x64.dmg
            binary: target/x86_64-apple-darwin/release/renzora-launcher
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: renzora-launcher-macos-arm64.dmg
            binary: target/aarch64-apple-darwin/release/renzora-launcher
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: renzora-launcher-linux-x64.AppImage
            binary: target/x86_64-unknown-linux-gnu/release/renzora-launcher
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: renzora-launcher-linux-arm64.tar.gz
            binary: target/aarch64-unknown-linux-gnu/release/renzora-launcher

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev


      # Generate icon.ico for Windows
      - name: Generate Windows icon
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          magick icon.png -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Build frontend
        run: |
          npm install
          npm run build

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      # Windows — zip exe + dist folder
      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p package
          cp "${{ matrix.binary }}" package/renzora-launcher.exe
          cp -r dist package/dist
          cd package && 7z a -tzip "../${{ matrix.artifact }}" . && cd ..

      # Linux ARM64 — tarball (appimagetool doesn't support ARM well)
      - name: Package Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p renzora-launcher
          cp "${{ matrix.binary }}" renzora-launcher/renzora-launcher
          chmod +x renzora-launcher/renzora-launcher
          cp -r dist renzora-launcher/dist
          cp icon.png renzora-launcher/icon.png
          tar czf "${{ matrix.artifact }}" renzora-launcher

      # Linux x64 — create AppImage
      - name: Package Linux
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps

          cp "${{ matrix.binary }}" AppDir/usr/bin/renzora-launcher
          chmod +x AppDir/usr/bin/renzora-launcher
          cp -r dist AppDir/usr/bin/dist
          cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/renzora-launcher.png
          cp icon.png AppDir/renzora-launcher.png

          # Desktop entry
          cat > AppDir/renzora-launcher.desktop << 'EOF'
          [Desktop Entry]
          Name=Renzora Launcher
          Exec=renzora-launcher
          Icon=renzora-launcher
          Type=Application
          Categories=Game;Development;
          EOF

          # AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/renzora-launcher" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Download appimagetool for the correct architecture
          if [ "$(uname -m)" = "aarch64" ]; then
            TOOL_ARCH="aarch64"
          else
            TOOL_ARCH="x86_64"
          fi
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${TOOL_ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          export ARCH=$TOOL_ARCH
          squashfs-root/AppRun AppDir "${{ matrix.artifact }}"

      # macOS — create .app bundle and .dmg
      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          APP="Renzora Launcher.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp "${{ matrix.binary }}" "$APP/Contents/MacOS/renzora-launcher"
          chmod +x "$APP/Contents/MacOS/renzora-launcher"

          # Copy dist into the app bundle
          cp -r dist "$APP/Contents/MacOS/dist"

          # Generate .icns from png
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Renzora Launcher</string>
            <key>CFBundleDisplayName</key>
            <string>Renzora Launcher</string>
            <key>CFBundleIdentifier</key>
            <string>com.renzora.launcher</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>renzora-launcher</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Create DMG with drag-to-Applications layout
          DMG_DIR="dmg_contents"
          mkdir -p "$DMG_DIR"
          cp -r "$APP" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          # Create temporary DMG
          hdiutil create -volname "Renzora Launcher" -srcfolder "$DMG_DIR" -ov -format UDRW -size 200m tmp.dmg

          # Mount and set window layout
          DEVICE=$(hdiutil attach -readwrite -noverify tmp.dmg | grep '/Volumes/' | awk '{print $1}')
          VOLUME="/Volumes/Renzora Launcher"

          # AppleScript to set DMG window appearance
          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "Renzora Launcher"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {100, 100, 640, 400}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 80
              set position of item "Renzora Launcher.app" of container window to {140, 150}
              set position of item "Applications" of container window to {400, 150}
              close
              open
              update without registering applications
            end tell
          end tell
          APPLESCRIPT

          # Finalize
          sync
          hdiutil detach "$DEVICE"
          hdiutil convert tmp.dmg -format UDZO -o "${{ matrix.artifact }}"
          rm -f tmp.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

name: Build Launcher

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: renzora-launcher-windows-x64.exe
            binary: renzora-launcher.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: renzora-launcher-macos-arm64.dmg
            binary: renzora-launcher
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: renzora-launcher-macos-x64.dmg
            binary: renzora-launcher
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: renzora-launcher-linux-x64.AppImage
            binary: renzora-launcher

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build app
        working-directory: app
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y


      # Windows: copy and compress
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp app/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      # Linux: create AppImage
      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          # Copy binary
          cp app/target/${{ matrix.target }}/release/${{ matrix.binary }} AppDir/usr/bin/renzora-launcher
          chmod +x AppDir/usr/bin/renzora-launcher

          # Create desktop entry
          cat > AppDir/renzora-launcher.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Renzora Launcher
          Comment=Renzora game platform and engine manager
          Exec=renzora-launcher
          Icon=renzora-launcher
          Type=Application
          Categories=Game;Development;
          DESKTOP
          cp AppDir/renzora-launcher.desktop AppDir/usr/share/applications/

          # Copy icon
          cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/renzora-launcher.png

          # Create AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/renzora-launcher" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Symlink icon and desktop file to root
          ln -sf usr/share/icons/hicolor/256x256/apps/renzora-launcher.png AppDir/renzora-launcher.png
          ln -sf usr/share/icons/hicolor/256x256/apps/renzora-launcher.png AppDir/.DirIcon

          # Build AppImage
          ARCH=x86_64 ./appimagetool AppDir ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      # macOS: create .app bundle and .dmg
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          # Create .app bundle structure
          APP_NAME="Renzora Launcher.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          # Copy binary and icon
          cp app/target/${{ matrix.target }}/release/${{ matrix.binary }} "$APP_NAME/Contents/MacOS/Renzora Launcher"
          chmod +x "$APP_NAME/Contents/MacOS/Renzora Launcher"
          cp icon.png "$APP_NAME/Contents/Resources/icon.png"

          # Create Info.plist
          cat > "$APP_NAME/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Renzora Launcher</string>
            <key>CFBundleDisplayName</key>
            <string>Renzora Launcher</string>
            <key>CFBundleIdentifier</key>
            <string>com.renzora.launcher</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>Renzora Launcher</string>
            <key>CFBundleIconFile</key>
            <string>icon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Create DMG
          brew install create-dmg || true
          create-dmg \
            --volname "Renzora Launcher" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon "Renzora Launcher.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "${{ matrix.artifact }}" \
            "$APP_NAME" || true

          # Fallback: if create-dmg fails, use hdiutil
          if [ ! -f "${{ matrix.artifact }}" ]; then
            hdiutil create -volname "Renzora Launcher" -srcfolder "$APP_NAME" -ov -format UDZO "${{ matrix.artifact }}"
          fi

      - name: Compress with UPX (brute)
        if: runner.os == 'Windows'
        run: upx --brute ${{ matrix.artifact }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

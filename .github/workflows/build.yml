name: Build Launcher

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: renzora-launcher-windows-x64.exe
            binary: renzora-launcher.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: renzora-launcher-macos-arm64
            binary: renzora-launcher
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: renzora-launcher-macos-x64
            binary: renzora-launcher
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: renzora-launcher-linux-x64
            binary: renzora-launcher

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build app
        working-directory: app
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp app/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp app/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Compress with UPX (brute)
        run: upx --brute ${{ matrix.artifact }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
